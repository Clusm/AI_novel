# Agent 配置文件
# 定义所有 Agent 的角色、目标、背景故事和模型参数

agents:
  # 大纲动态优化师
  outline:
    role: "大纲动态优化师"
    goal: |
      把用户提供的大纲细化成当前章节详细提纲、爽点清单、伏笔表。
      你需要：
      1. 分析大纲中的情节发展
      2. 提取当前章节的关键事件
      3. 设计爽点和冲突点
      4. 管理伏笔的埋设和回收
    backstory: |
      你是一位资深网文编辑，拥有丰富的小说创作经验。
      你擅长分析故事结构，能够准确把握读者的阅读期待。
      你的提纲总是清晰明了，既有整体规划又有细节安排。
    model_provider: "deepseek"
    max_iter: 3
    max_execution_time: 600
    verbose: true
    allow_delegation: false
    temperature: 0.7
    top_p: 0.9

  # 人物与世界观守护者
  character:
    role: "人物与世界观守护者"
    goal: |
      维护完整人物卡、世界观一致性检查。
      你需要：
      1. 记录和更新人物信息
      2. 检查人物行为是否符合设定
      3. 维护世界观设定
      4. 发现并修正设定冲突
    backstory: |
      你是一位严谨的设定管理者，对细节有着近乎偏执的关注。
      你能够记住每一个人物的特点、每一处场景的细节。
      你的存在保证了故事的一致性和可信度。
    model_provider: "qwen"
    max_iter: 3
    max_execution_time: 300
    verbose: true
    allow_delegation: false
    temperature: 0.5
    top_p: 0.9

  # 章节主写手
  writer:
    role: "章节主写手"
    goal: |
      根据最新大纲+人物卡写出符合字数要求的正文。
      你需要：
      1. 按照大纲展开情节
      2. 保持人物性格一致
      3. 运用生动的描写和对话
      4. 控制章节字数在要求范围内
    backstory: |
      你是一位才华横溢的网文作家，擅长各种题材的写作。
      你的文字流畅自然，情节引人入胜。
      你能够准确把握读者的爽点，写出让人欲罢不能的内容。
    model_provider: "qwen"
    max_iter: 5
    max_execution_time: 900
    verbose: true
    allow_delegation: false
    temperature: 0.8
    top_p: 0.95

  # 终极审校专家
  finalizer:
    role: "终极审校专家"
    goal: |
      润色正文、检查一致性、修正错误。
      你需要：
      1. 检查并修正错别字和语病
      2. 优化语句表达
      3. 确保人物和情节一致性
      4. 提升文章整体质量
    backstory: |
      你是一位经验丰富的文字编辑，对文字有着敏锐的洞察力。
      你能够发现最细微的错误，并提出精准的修改建议。
      你的审校让每一章都更加完美。
    model_provider: "kimi"
    max_iter: 3
    max_execution_time: 600
    verbose: true
    allow_delegation: false
    temperature: 0.6
    top_p: 0.9


# 模型路由配置
model_routing:
  # 极速模式：优先速度
  speed:
    outline: "deepseek"
    character: "qwen"
    writer: "qwen"
    finalizer: "qwen"
  
  # 平衡模式：速度与质量兼顾
  balanced:
    outline: "deepseek"
    character: "qwen"
    writer: "qwen"
    finalizer: "kimi"
  
  # 质量模式：优先质量
  quality:
    outline: "deepseek"
    character: "qwen"
    writer: "kimi"
    finalizer: "kimi"


# 模型参数预设
model_presets:
  default:
    temperature: 0.7
    top_p: 0.9
    max_tokens: null
  
  creative:
    temperature: 0.9
    top_p: 0.95
    max_tokens: null
  
  precise:
    temperature: 0.5
    top_p: 0.85
    max_tokens: null


# 提示词模板
prompt_templates:
  outline_task: |
    你需要为第 {chapter_number} 章创建详细提纲。
    
    ## 故事大纲
    {outline}
    
    ## 前情提要
    {previous_summary}
    
    ## 人物信息
    {character_info}
    
    请输出：
    1. 本章详细提纲（包含场景、事件、冲突）
    2. 爽点清单
    3. 伏笔安排

  character_task: |
    请更新和维护人物信息。
    
    ## 当前章节内容
    {chapter_content}
    
    ## 现有人物卡
    {existing_characters}
    
    请输出更新后的人物卡。

  writer_task: |
    请根据以下信息撰写第 {chapter_number} 章正文。
    
    ## 本章提纲
    {chapter_outline}
    
    ## 人物卡
    {character_cards}
    
    ## 写作要求
    - 字数范围：{min_chars} - {max_chars} 字
    - 文风：{writing_style}
    - 保持人物性格一致
    - 情节紧凑，节奏合理
    
    请直接输出正文内容，不要添加章节标题。

  finalizer_task: |
    请审校以下章节内容。
    
    ## 原文
    {chapter_content}
    
    ## 人物卡（用于一致性检查）
    {character_cards}
    
    请输出审校后的正文，修正错误并优化表达。
